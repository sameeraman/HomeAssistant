- sensor:
# Water meter
  - name: "Water Meter"
    unit_of_measurement: "m³"
    state: "{{ (states('counter.water_meter_count')|float / 1000 ) }}"
    device_class: water
    state_class: total_increasing

- vacuum:
  - name: "L10s Ultra Gen 2"
    unique_id: dreame_l10s_template_vacuum
    state: "{% set s = states('sensor.l10s_ultra_gen_2_status') %}{% if s in ['room_cleaning','zone_cleaning','spot_cleaning','shortcut_running','summon_clean'] %}cleaning{% elif s == 'charging' %}docked{% elif s == 'returning' %}returning{% elif s in ['sleeping','standby'] %}idle{% elif s == 'error' %}error{% else %}idle{% endif %}"
    battery_level: "{{ states('sensor.l10s_ultra_gen_2_battery') | int(0) }}"
    attributes:
      status: "{{ states('sensor.l10s_ultra_gen_2_status') }}"
      fan_speed: "{{ states('sensor.l10s_ultra_gen_2_suction_level') }}"